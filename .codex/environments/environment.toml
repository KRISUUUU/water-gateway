version = 1
name = "water-gateway"

[setup]
script = '''
if (Test-Path ".\requirements.txt") { pip install -r .\requirements.txt }
if (Test-Path ".\package.json") { npm install }
if (Test-Path ".\sdkconfig.defaults") { Write-Host "ESP-IDF project detected" }
if (Get-Command idf.py -ErrorAction SilentlyContinue) { idf.py reconfigure }
'''

[[actions]]
name = "Configure"
icon = "tool"
command = "idf.py reconfigure"

[[actions]]
name = "Build"
icon = "tool"
command = "idf.py build"

[[actions]]
name = "Flash"
icon = "tool"
command = "idf.py monitor"

[[actions]]
name = "Full clean"
icon = "tool"
command = "idf.py fullclean"
